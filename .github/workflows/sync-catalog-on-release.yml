name: Sync Catalog On Release

on:
  release:
    types: [published, edited, released, prereleased]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to apply, for example 2d-to-3d-v0.1.1
        required: true
        type: string
      prerelease:
        description: Mark this release as beta channel
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  sync-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve release inputs
        id: release_meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ github.event.release.prerelease }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify release assets
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: node scripts/verify-release-assets.mjs --tag=${{ steps.release_meta.outputs.tag }}

      - name: Apply release tag to local catalog
        run: node scripts/apply-release-tag.mjs --tag=${{ steps.release_meta.outputs.tag }}
        env:
          RELEASE_PRERELEASE: ${{ steps.release_meta.outputs.prerelease }}

      - name: Build remote manifest
        run: node scripts/build-remote-manifest.mjs

      - name: Build site bundle
        run: node scripts/build-site-bundle.mjs

      - name: Commit catalog updates
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/catalog.local.json config/catalog.remote.json catalog.json
          if git diff --cached --quiet; then
            echo "No catalog changes to commit."
            exit 0
          fi
          git commit -m "Sync catalog for ${{ steps.release_meta.outputs.tag }}"
          git push
