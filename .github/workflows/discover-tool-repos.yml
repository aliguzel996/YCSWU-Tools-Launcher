name: Discover Tool Repos

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover-and-sync:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Discover YCSWU tool repos
        run: node scripts/discover-tool-repos.mjs

      - name: Build remote manifest
        run: node scripts/build-remote-manifest.mjs

      - name: Build site bundle
        run: node scripts/build-site-bundle.mjs

      - name: Commit discovered registry updates
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/discovered-tools.json config/catalog.remote.json catalog.json
          if git diff --cached --quiet; then
            echo "No discovery changes to commit."
            exit 0
          fi
          git commit -m "Discover tool repos and sync catalog"
          git push
